<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sortear</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0f;
    --accent:  #e8ff3c;
    --accent2: #ff3caa;
    --muted:   #555570;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.4s ease;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 100; opacity: 0.4;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .result-display {
    font-size: 96px;
    font-weight: 800;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    line-height: 1;
    min-width: 180px;
    text-align: center;
    text-shadow: 0 0 40px color-mix(in srgb, var(--accent) 30%, transparent);
    opacity: 0;
    transition: opacity 0.2s ease, color 0.4s ease;
  }

  .result-display.visible { opacity: 1; }
  .result-display.flash { animation: flash 0.4s ease; }

  @keyframes flash {
    0%   { transform: scale(1.3); color: #fff; text-shadow: 0 0 80px #fff; }
    100% { transform: scale(1);   color: var(--accent); }
  }

  .btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 18px 48px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    transition: transform 0.1s ease, box-shadow 0.2s ease, background 0.4s ease;
    box-shadow: 4px 4px 0 var(--accent2);
  }

  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--accent2); }
  .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--accent2); }
  .btn .dice { display: inline-block; margin-right: 8px; transition: transform 0.3s ease; }
  .btn:hover .dice { transform: rotate(45deg); }

  .range-info {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  .corner {
    position: fixed;
    width: 40px; height: 40px;
    border-color: var(--muted);
    border-style: solid;
    opacity: 0.2;
  }
  .corner.tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">
  <div class="label">Último sorteio</div>
  <div class="result-display" id="display">—</div>
  <button class="btn" onclick="sortear()">
    <span class="dice">⚄</span> Sortear
  </button>
  <div class="range-info">1 — 100</div>
</div>

<script>
  // ── Lê parâmetros da URL e aplica como CSS variables ──────────────────────
  const params = new URLSearchParams(location.search);
  const root   = document.documentElement;

  const varMap = {
    bg:      '--bg',
    accent:  '--accent',
    accent2: '--accent2',
    muted:   '--muted',
  };

  for (const [param, cssVar] of Object.entries(varMap)) {
    const val = params.get(param);
    if (val) root.style.setProperty(cssVar, `#${val}`);
  }

  // ── BroadcastChannel ──────────────────────────────────────────────────────
  const channel = new BroadcastChannel('sorteio');

  function sortear() {
    const numero = Math.floor(Math.random() * 100) + 1;
    channel.postMessage({ tipo: 'sorteio', numero });
    atualizarDisplay(numero);
  }

  function atualizarDisplay(numero) {
    const el = document.getElementById('display');
    el.classList.remove('flash');
    el.textContent = numero;
    el.classList.add('visible');
    void el.offsetWidth;
    el.classList.add('flash');
  }
</script>
</body>
</html>
